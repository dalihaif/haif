<head>
  <meta charset="UTF-8">

</head>
<body>

    <div class="container">
      <a href="index.html" class="nav-brand">
        <span class="brand-icon">李</span>

      </ul>
    </div>

  <main class="page-main">
    <div class="container">

      <section class="hero animate-in" style="padding: 30px 0 40px;">
        <h1>联系我</h1>
        <p class="subtitle">欢迎与我取得联系</p>
      </section>

      <div class="contact-grid">

        <!-- 联系表单 -->
        <div class="contact-form animate-in">
          <h2>发送消息</h2>
          <form id="contactForm">
            <div class="form-group">
              <label for="name">姓名</label>
              <input type="text" id="name" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
              <label for="email">邮箱</label>
              <input type="email" id="email" placeholder="请输入您的邮箱" required>
            </div>
            <div class="form-group">
              <label for="message">消息内容</label>
              <textarea id="message" placeholder="请输入您想说的内容..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              发送消息
            </button>
          </form>
          <div class="form-success" id="formSuccess">✅ 消息发送成功！感谢您的联系。</div>
        </div>

        <!-- 联系方式卡片 -->
        <div class="contact-cards animate-in">
          <div class="contact-card">
            <h3>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              电话
            </h3>
            <div class="contact-detail"><span class="dot"></span>13988531240</div>
          </div>

          <div class="contact-card">
            <h3>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              邮箱
            </h3>
            <div class="contact-detail"><span class="dot"></span>dalihaif@qq.com</div>
          </div>

          <div class="contact-card">
            <h3>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              地址
            </h3>
            <div class="contact-detail"><span class="dot"></span>大理大学第一附属医院</div>
            <div class="contact-detail"><span class="dot" style="background: transparent;"></span>云南省大理白族自治州</div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 李海峰 | 大理大学第一附属医院</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // 联系表单处理
    document.addEventListener('DOMContentLoaded', function() {
      var form = document.getElementById('contactForm');
      var successMsg = document.getElementById('formSuccess');

      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();

          // 模拟发送（实际使用时替换为 Formspree 或其他服务的 API）
          var name = document.getElementById('name').value;
          var email = document.getElementById('email').value;
          var message = document.getElementById('message').value;

          // 使用 mailto 作为默认后备方案（GitHub Pages 无法运行后端）
          var mailtoLink = 'mailto:dalihaif@qq.com?subject=来自个人网站的留言 - ' +
            encodeURIComponent(name) +
            '&body=' + encodeURIComponent(
              '姓名：' + name + '\n' +
              '邮箱：' + email + '\n' +
              '消息：\n' + message
            );

          // 显示成功消息
          successMsg.classList.add('show');
          form.reset();

          // 打开邮件客户端
          window.location.href = mailtoLink;

          // 3秒后隐藏成功消息
          setTimeout(function() {
            successMsg.classList.remove('show');
          }, 5000);
        });
      }
    });
  </script>
</body>
</html>
